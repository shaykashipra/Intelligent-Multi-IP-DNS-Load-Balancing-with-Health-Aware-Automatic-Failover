[General]
network = multi_ip_http_failover_system.networks.MultiIPNet
sim-time-limit = 80s
# DNS Load Balancing Configuration
*.dns.loadBalanceStrategy = 0  # 0=SEQUENTIAL, 1=ROUND_ROBIN, 2=WEIGHTED, 3=RESPONSE_TIME

# Client configuration
*.pc.address = 1

# DNS configuration  
*.dns.address = 2

# HTTP Servers configuration
*.http1.address = 3
*.http2.address = 4

# Statistics
**.vector-recording = true
**.scalar-recording = true

## Client parameters
#*.pc.timeout = 1.5s  # Shorter timeout for faster failover
#*.pc.maxRetries = 5   # Allow more retries
#
## HTTP server failure parameters
#*.httpA.failureProbability = 0.4  # Higher failure probability for server A
#*.httpB.failureProbability = 0.2  # Medium failure probability for server B  
#*.httpC.failureProbability = 0.1  # Lower failure probability for server C
#
## Different service times to simulate different server loads
#*.httpA.serviceTime = 10ms
#*.httpB.serviceTime = 5ms
#*.httpC.serviceTime = 3ms
